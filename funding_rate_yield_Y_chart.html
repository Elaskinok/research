<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Funding rate yearly yield %</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: #151518; font-family: sans-serif; padding: 20px; }

        .chart-title {
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 700;
            color: #d1d4dc;
            text-transform: uppercase;
        }

        #chart { width: 100%; height: 460px; }

        #error {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #3a1a1a;
            border: 1px solid #7a3a3a;
            color: #f99;
            display: none;
        }
    </style>
</head>
<body>
<h1 class="chart-title" id="title"></h1>
<div id="error"></div>
<div id="chart"></div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script src="./chart_component.js"></script>
<script>
    const DIR = './funding_rate_yield_Y_data';
    const coin = new URLSearchParams(location.search).get('coin');
    document.getElementById('title').textContent = `Funding rate yearly yield % — ${coin}`;

    async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
        return res.json();
    }

    async function main() {
        const exchanges = await fetchJson(`${DIR}/index.json`);

        const exchangesWithCoin = (
            await Promise.all(
                exchanges.map(async exchange => {
                    const coins = await fetchJson(`${DIR}/${exchange}/index.json`);
                    return coins.includes(coin) ? exchange : null;
                })
            )
        ).filter(Boolean);

        const seriesList = await Promise.all(
            exchangesWithCoin.map(async exchange => ({
                label: exchange.charAt(0).toUpperCase() + exchange.slice(1),
                data: await fetchJson(`${DIR}/${exchange}/${coin}.json`),
            }))
        );

        ChartComponent.create(document.getElementById('chart'), seriesList);
    }

    main().catch(err => {
        const box = document.getElementById('error');
        box.textContent = err.message;
        box.style.display = 'block';
    });
</script>
</body>
</html>
