<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Funding rate yearly yield % (BTC/USD:BTC)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: white; padding: 20px; }

        .chart-title {
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 700;
            color: #222;
        }

        #chart { width: 100%; height: 460px; }

        #error {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #fee;
            border: 1px solid #f99;
            display: none;
        }
    </style>
</head>
<body>
<h1 class="chart-title">Funding rate yearly yield % (BTC/USD:BTC)</h1>
<div id="error"></div>
<div id="chart"></div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script>
    const COLORS = ['#2962FF', '#E91E63', '#FF6D00', '#00BCD4', '#4CAF50', '#9C27B0'];

    const errorBox = document.getElementById('error');
    const chartContainer = document.getElementById('chart');

    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = 'block';
        console.error(message);
    }

    async function main() {
        const chart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.clientWidth,
            height: 460,
            timeScale: { timeVisible: true },
        });

        const dir = './funding_rate_yield_Y_data';

        const indexRes = await fetch(`${dir}/index.json`);
        if (!indexRes.ok) throw new Error(`Failed to load index: ${indexRes.status}`);
        const exchanges = await indexRes.json();

        await Promise.all(exchanges.map(async (name, i) => {
            const res = await fetch(`${dir}/${name}.json`);
            if (!res.ok) throw new Error(`Failed to load ${name}.json: ${res.status}`);
            const data = await res.json();
            const series = chart.addSeries(LightweightCharts.LineSeries, {
                color: COLORS[i % COLORS.length],
                title: name.charAt(0).toUpperCase() + name.slice(1),
            });
            series.setData(data);
        }));

        chart.timeScale().fitContent();

        window.addEventListener('resize', () => {
            chart.resize(chartContainer.clientWidth, 460);
        });
    }

    main().catch(err => showError(err.message));
</script>
</body>
</html>
