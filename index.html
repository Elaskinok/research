<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Research Charts</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #0e0e10;
            padding: 32px 5%;
        }

        h1 {
            margin: 0 0 24px 0;
            font-size: 28px;
            font-weight: 700;
            color: #d1d4dc;
        }

        .chart-card {
            background: #151518;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .chart-card iframe {
            display: block;
            width: 100%;
            height: 520px;
            border: none;
        }
    </style>
</head>
<body>
<h1>Research Charts</h1>
<div id="charts"></div>

<script>
    fetch('./charts.json')
        .then(r => r.json())
        .then(srcs => {
            const container = document.getElementById('charts');
            for (const src of srcs) {
                const card = document.createElement('div');
                card.className = 'chart-card';
                const iframe = document.createElement('iframe');
                iframe.src = src;
                iframe.scrolling = 'no';
                card.appendChild(iframe);
                container.appendChild(card);
            }
        });
</script>
</body>
</html>
