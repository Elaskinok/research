<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Funding rate yearly yield % (Binance BTC/USD:BTC)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: white; padding: 20px; }

        .chart-title {
            margin-bottom: 8px;
            font-size: 20px;
            font-weight: 700;
            color: #222;
        }

        .chart-subtitle {
            margin-bottom: 16px;
            font-size: 13px;
            color: #666;
        }

        #chart { width: 100%; height: 460px; }

        #error {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #fee;
            border: 1px solid #f99;
            display: none;
        }
    </style>
</head>
<body>
<h1 class="chart-title">Funding rate yearly yield % (Binance BTC/USD:BTC)</h1>
<div id="error"></div>
<div id="chart"></div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script>
    const errorBox = document.getElementById('error');
    const chartContainer = document.getElementById('chart');

    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = 'block';
        console.error(message);
    }

    async function main() {
        const chart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.clientWidth,
            height: 460,
            timeScale: { timeVisible: true },
        });

        const lineSeries = chart.addSeries(LightweightCharts.LineSeries);

        const response = await fetch('./funding_rate_yeild_Y_binance_btc_usd_btc.json');
        if (!response.ok) {
            throw new Error(`Failed to load data: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        lineSeries.setData(data);
        chart.timeScale().fitContent();

        window.addEventListener('resize', () => {
            chart.resize(chartContainer.clientWidth, 460);
        });
    }

    main().catch(err => showError(err.message));
</script>
</body>
</html>
