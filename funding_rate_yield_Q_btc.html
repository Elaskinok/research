<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Funding rate quarterly yield % — BTC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: #151518; font-family: sans-serif; }
        body { padding: 20px; }
        .chart-title { margin-bottom: 16px; font-size: 20px; font-weight: 700; color: #d1d4dc; text-transform: uppercase; }
        #chart { width: 100%; height: 460px; border: 1px solid #2a2a2e; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>
<div class="chart-title">Funding rate quarterly yield % — BTC</div>
<div id="chart"></div>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script src="./chart_component.js"></script>
<script>
    async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
        return res.json();
    }

    async function main() {
        const [binance, bybit] = await Promise.all([
            fetchJson('./funding_rate_yield_Q_data/binance/btc.json'),
            fetchJson('./funding_rate_yield_Q_data/bybit/btc.json'),
        ]);
        ChartComponent.create(document.getElementById('chart'), [
            { label: 'Binance', data: binance },
            { label: 'Bybit',   data: bybit },
        ]);
    }

    main().catch(console.error);
</script>
</body>
</html>
