<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Funding rate yearly yield %</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: #151518; font-family: sans-serif; }

        .chart-block { padding: 20px; }
        .chart-block + .chart-block { border-top: 1px solid #2a2a2e; }

        .chart-title {
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 700;
            color: #d1d4dc;
            text-transform: uppercase;
        }

        .chart-container { width: 100%; height: 460px; }

        #error {
            padding: 8px 12px;
            background: #3a1a1a;
            border: 1px solid #7a3a3a;
            color: #f99;
            display: none;
        }
    </style>
</head>
<body>
<div id="error"></div>
<div id="charts"></div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script>
    const COLORS = ['#2962FF', '#E91E63', '#FF6D00', '#00BCD4', '#4CAF50', '#9C27B0'];
    const DIR = './funding_rate_yield_Y_data';

    async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
        return res.json();
    }

    async function main() {
        const exchanges = await fetchJson(`${DIR}/index.json`);

        const exchangeCoins = await Promise.all(
            exchanges.map(async exchange => ({
                exchange,
                coins: await fetchJson(`${DIR}/${exchange}/index.json`),
            }))
        );

        const allCoins = [...new Set(exchangeCoins.flatMap(e => e.coins))];
        const container = document.getElementById('charts');

        for (const coin of allCoins) {
            const block = document.createElement('div');
            block.className = 'chart-block';

            const title = document.createElement('h2');
            title.className = 'chart-title';
            title.textContent = `Funding rate yearly yield % — ${coin}`;
            block.appendChild(title);

            const chartContainer = document.createElement('div');
            chartContainer.className = 'chart-container';
            block.appendChild(chartContainer);
            container.appendChild(block);

            const chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: 460,
                timeScale: { timeVisible: true },
                layout: {
                    background: { color: '#151518' },
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: '#2a2a2e' },
                    horzLines: { color: '#2a2a2e' },
                },
                crosshair: {
                    vertLine: { color: '#758696', labelBackgroundColor: '#3d5068' },
                    horzLine: { color: '#758696', labelBackgroundColor: '#3d5068' },
                },
            });

            const exchangesWithCoin = exchangeCoins.filter(e => e.coins.includes(coin));
            await Promise.all(exchangesWithCoin.map(async ({ exchange }, i) => {
                const data = await fetchJson(`${DIR}/${exchange}/${coin}.json`);
                const series = chart.addSeries(LightweightCharts.LineSeries, {
                    color: COLORS[i % COLORS.length],
                    title: exchange.charAt(0).toUpperCase() + exchange.slice(1),
                });
                series.setData(data);
            }));

            chart.timeScale().fitContent();

            window.addEventListener('resize', () => {
                chart.resize(chartContainer.clientWidth, 460);
            });
        }

        window.parent.postMessage({ iframeHeight: document.body.scrollHeight }, '*');
    }

    main().catch(err => {
        const box = document.getElementById('error');
        box.textContent = err.message;
        box.style.display = 'block';
        window.parent.postMessage({ iframeHeight: document.body.scrollHeight }, '*');
    });
</script>
</body>
</html>
