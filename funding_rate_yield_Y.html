<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Funding rate yearly yield %</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: white; }

        iframe {
            width: 100%;
            height: 540px;
            border: none;
            display: block;
            margin-left: 5%;
            margin-right: 5%;
        }

        iframe + iframe {
            border-top: 1px solid #eee;
        }

        #error {
            padding: 8px 12px;
            background: #fee;
            border: 1px solid #f99;
            display: none;
        }
    </style>
</head>
<body>
<div id="error"></div>
<div id="charts"></div>

<script>
    const DIR = './funding_rate_yield_Y_data';

    async function main() {
        const res = await fetch(`${DIR}/index.json`);
        if (!res.ok) throw new Error(`Failed to load index: ${res.status}`);
        const exchanges = await res.json();

        const coinSets = await Promise.all(
            exchanges.map(e => fetch(`${DIR}/${e}/index.json`).then(r => r.json()))
        );
        const allCoins = [...new Set(coinSets.flat())];

        const container = document.getElementById('charts');
        for (const coin of allCoins) {
            const iframe = document.createElement('iframe');
            iframe.src = `funding_rate_yield_Y_chart.html?coin=${coin}`;
            container.appendChild(iframe);
        }
    }

    main().catch(err => {
        const box = document.getElementById('error');
        box.textContent = err.message;
        box.style.display = 'block';
    });
</script>
</body>
</html>
