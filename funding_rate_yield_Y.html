<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Funding rate yearly yield %</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: white; padding: 20px; }

        .chart-block { margin-bottom: 32px; }

        .chart-title {
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 700;
            color: #222;
            text-transform: uppercase;
        }

        .chart-container { width: 100%; height: 460px; }

        #error {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #fee;
            border: 1px solid #f99;
            display: none;
        }
    </style>
</head>
<body>
<div id="error"></div>
<div id="charts"></div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script>
    const COLORS = ['#2962FF', '#E91E63', '#FF6D00', '#00BCD4', '#4CAF50', '#9C27B0'];
    const DIR = './funding_rate_yield_Y_data';

    const errorBox = document.getElementById('error');
    const chartsContainer = document.getElementById('charts');

    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = 'block';
        console.error(message);
    }

    async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
        return res.json();
    }

    async function main() {
        const exchanges = await fetchJson(`${DIR}/index.json`);

        // Load each exchange's coin list
        const exchangeCoins = await Promise.all(
            exchanges.map(async exchange => ({
                exchange,
                coins: await fetchJson(`${DIR}/${exchange}/index.json`),
            }))
        );

        // Collect all unique coins preserving first-seen order
        const allCoins = [...new Set(exchangeCoins.flatMap(e => e.coins))];

        for (const coin of allCoins) {
            const block = document.createElement('div');
            block.className = 'chart-block';

            const title = document.createElement('h2');
            title.className = 'chart-title';
            title.textContent = `Funding rate yearly yield % — ${coin}`;
            block.appendChild(title);

            const container = document.createElement('div');
            container.className = 'chart-container';
            block.appendChild(container);
            chartsContainer.appendChild(block);

            const chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 460,
                timeScale: { timeVisible: true },
            });

            const exchangesWithCoin = exchangeCoins.filter(e => e.coins.includes(coin));

            await Promise.all(exchangesWithCoin.map(async ({ exchange }, i) => {
                const data = await fetchJson(`${DIR}/${exchange}/${coin}.json`);
                const series = chart.addSeries(LightweightCharts.LineSeries, {
                    color: COLORS[i % COLORS.length],
                    title: exchange.charAt(0).toUpperCase() + exchange.slice(1),
                });
                series.setData(data);
            }));

            chart.timeScale().fitContent();

            window.addEventListener('resize', () => {
                chart.resize(container.clientWidth, 460);
            });
        }
    }

    main().catch(err => showError(err.message));
</script>
</body>
</html>
